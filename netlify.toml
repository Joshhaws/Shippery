# Shippery — static site (no bundler).
#
# Netlify UI (must match this):
#   Base directory:        (empty)
#   Build command:         (leave empty — this file supplies it)
#   Publish directory:     .  (dot = site root)
#
# Do NOT add an SPA-style redirect like "/* → /index.html" — that would serve
# HTML for /game.js and break the game in the browser.

[build]
  publish = "."
  # No build step — static files only. The game needs game.js at the repo root (commit it or the site loads but won’t run).

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
